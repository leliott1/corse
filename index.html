<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#EEF3F6">
<meta name="description" content="Carte interactive des spots de Corse du Sud : plages, montagne, restos et activités autour de Porto-Vecchio.">
<title>Corse du Sud, les spots</title>
<link rel="icon" type="image/png" sizes="192x192" href="img/icon-192.png">
<link rel="icon" type="image/svg+xml" href="img/icon.svg">
<link rel="apple-touch-icon" href="img/icon-180.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Corse Sud">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://server.arcgisonline.com" crossorigin>
<link rel="preconnect" href="https://a.basemaps.cartocdn.com" crossorigin>
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --encre:#16232C;
    --encre-2:#3A4B59;
    --corail:#FF5324;
    --corail-fonce:#E64514;
    --corail-btn:#C8400F;   /* fond des boutons pleins : blanc lisible dessus (≥4.5:1) */
    --corail-txt:#B93A0E;   /* corail assez foncé pour du texte sur verre clair */
    --base:#E0A02C;
    --sud:#12A5A0;
    --nord:#3E8CC7;
    --boni:#C0563F;
    --pin:#43704E;
    /* Liquid glass */
    /* Opacités ≥ .72 pour garder le contraste du texte au-dessus de la mer sombre */
    --glass:rgba(255,255,255,.72);
    --glass-fort:rgba(255,255,255,.86);
    --glass-voile:rgba(244,248,250,.9);
    --stroke:rgba(255,255,255,.65);
    --tint:rgba(84,110,128,.10);
    --ombre:0 10px 32px rgba(9,30,44,.22);
    --ombre-leg:0 4px 16px rgba(9,30,44,.16);
    --reflet:inset 0 1px 0 rgba(255,255,255,.75);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  button,a,.card,.row{touch-action:manipulation}
  html,body{height:100%}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:'Nunito',system-ui,sans-serif;
    background:#DDE6EB;
    color:var(--encre);
    overflow:hidden;
  }
  #map{position:absolute;inset:0;background:#C6D4DC}

  /* ---------- Verre : surfaces floutées ---------- */
  .glass{
    background:var(--glass);
    -webkit-backdrop-filter:blur(22px) saturate(1.7);
    backdrop-filter:blur(22px) saturate(1.7);
    border:1px solid var(--stroke);
    box-shadow:var(--reflet), var(--ombre-leg);
  }
  @supports not ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))){
    .glass{background:rgba(255,255,255,.93)}
    .sheet,.list,.disco{background:rgba(250,252,253,.98) !important}
    .card{background:rgba(255,255,255,.96) !important}
  }

  /* ---------- En-tête flottant ---------- */
  .topbar{
    position:absolute;z-index:1000;left:12px;right:12px;
    top:calc(env(safe-area-inset-top) + 12px);
    pointer-events:none;
  }
  .brand{
    display:inline-block;pointer-events:auto;
    border-radius:20px;
    padding:10px 16px 9px;
  }
  .title{font-size:19px;font-weight:800;letter-spacing:-.02em;line-height:1.1}
  .title span{color:var(--corail)}
  .sub{font-size:11px;font-weight:700;color:var(--encre-2);margin-top:1px}

  /* ---------- Filtres ---------- */
  /* pointer-events:none sur la bande, auto sur les puces : la carte reste
     cliquable à droite du dernier filtre */
  .filters{
    position:absolute;z-index:1000;left:0;right:0;
    top:calc(env(safe-area-inset-top) + 80px);
    display:flex;gap:8px;overflow-x:auto;padding:4px 12px 10px;
    scrollbar-width:none;overscroll-behavior-x:contain;
    pointer-events:none;
  }
  .chip{pointer-events:auto}
  .filters::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto;cursor:pointer;
    color:var(--encre-2);
    min-height:44px;padding:8px 14px;border-radius:999px;
    font-family:'Nunito',sans-serif;
    font-size:12px;font-weight:800;
    display:flex;align-items:center;gap:7px;
    transition:background .18s, color .18s;
  }
  .chip .dot{width:8px;height:8px;border-radius:50%;background:var(--c)}
  /* Teinte assombrie pour garder le blanc lisible (contraste ≥ 4.5:1) */
  .chip.on{background:var(--c);background:color-mix(in srgb,var(--c) 62%,#16232C);color:#fff;border-color:color-mix(in srgb,var(--c) 60%,white)}
  .chip.on .dot{background:#fff}
  .chip:focus-visible{outline:2px solid var(--corail);outline-offset:2px}

  /* ---------- Marqueurs photo ---------- */
  .step{position:relative;width:44px;height:44px;transition:transform .18s}
  .step .ph{
    width:44px;height:44px;border-radius:50%;
    border:3px solid rgba(255,255,255,.92);background:var(--c) center/cover no-repeat;
    box-shadow:0 4px 12px rgba(9,30,44,.4);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:800;font-size:15px;
  }
  .step .num{
    position:absolute;top:-4px;right:-4px;
    min-width:18px;height:18px;padding:0 4px;border-radius:9px;
    background:var(--corail-btn);border:2px solid rgba(255,255,255,.95);
    color:#fff;font-size:10px;font-weight:800;
    display:flex;align-items:center;justify-content:center;
  }
  .step.active{transform:scale(1.3);z-index:999}
  .step.active .ph{border-color:var(--corail)}

  /* ---------- Carrousel de cartes ---------- */
  /* La bande laisse passer les taps vers la carte et le zoom dans les
     gouttières vides ; seules les cartes elles-mêmes sont interactives */
  .cards{
    position:absolute;z-index:1000;left:0;right:0;
    bottom:calc(env(safe-area-inset-bottom) + 12px);
    display:flex;gap:12px;overflow-x:auto;
    padding:14px calc(50vw - 125px) 8px;
    scroll-snap-type:x mandatory;scrollbar-width:none;
    overscroll-behavior-x:contain;
    pointer-events:none;
  }
  .card{pointer-events:auto}
  .cards::-webkit-scrollbar{display:none}
  .card{
    flex:0 0 250px;scroll-snap-align:center;cursor:pointer;
    background:var(--glass);
    -webkit-backdrop-filter:blur(18px) saturate(1.6);
    backdrop-filter:blur(18px) saturate(1.6);
    border:1px solid var(--stroke);
    border-radius:22px;
    box-shadow:var(--reflet), var(--ombre);
    overflow:hidden;
    transition:transform .18s, border-color .18s;
  }
  .card.sel{transform:translateY(-6px);border-color:var(--corail)}
  .card .im{
    height:112px;background:var(--c) center/cover no-repeat;position:relative;
  }
  .card .im .badge{
    position:absolute;top:8px;left:8px;
    background:rgba(255,255,255,.68);
    -webkit-backdrop-filter:blur(10px) saturate(1.5);
    backdrop-filter:blur(10px) saturate(1.5);
    border:1px solid rgba(255,255,255,.6);
    color:var(--encre);
    font-size:11px;font-weight:800;border-radius:999px;padding:3px 9px;
    display:flex;align-items:center;gap:5px;
  }
  .card .im .badge i{width:7px;height:7px;border-radius:50%;background:var(--c);display:block}
  .card .tx{padding:9px 13px 12px}
  .card .nm{font-size:14.5px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card .mt{font-size:11px;font-weight:700;color:var(--encre-2);margin-top:2px;
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* ---------- Boutons flottants ---------- */
  .fabs{
    position:absolute;z-index:1150;right:12px;
    bottom:calc(env(safe-area-inset-bottom) + 214px);
    display:flex;flex-direction:column;gap:10px;
  }
  .fab{
    width:48px;height:48px;border-radius:50%;cursor:pointer;
    color:var(--encre);
    display:flex;align-items:center;justify-content:center;
  }
  .fab svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .fab:active{transform:scale(.94)}

  /* ---------- À découvrir : bouton ---------- */
  .disco-btn{
    position:absolute;z-index:1000;left:12px;
    bottom:calc(env(safe-area-inset-bottom) + 214px);
    border:1px solid rgba(255,255,255,.45);cursor:pointer;
    background:color-mix(in srgb,var(--corail-btn) 94%,transparent);
    -webkit-backdrop-filter:blur(14px) saturate(1.6);
    backdrop-filter:blur(14px) saturate(1.6);
    color:#fff;
    font-family:'Nunito',sans-serif;font-size:12.5px;font-weight:800;
    min-height:44px;padding:11px 15px;border-radius:999px;
    display:flex;align-items:center;gap:7px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.4), 0 8px 22px rgba(255,83,36,.42);
  }
  .disco-btn svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .disco-btn:active{transform:scale(.96)}

  /* ---------- Fiche détaillée ---------- */
  .sheet{
    position:absolute;z-index:1200;left:0;right:0;bottom:0;
    background:var(--glass-fort);
    -webkit-backdrop-filter:blur(26px) saturate(1.8);
    backdrop-filter:blur(26px) saturate(1.8);
    border:1px solid var(--stroke);border-bottom:0;
    border-radius:26px 26px 0 0;
    box-shadow:var(--reflet), 0 -14px 48px rgba(9,30,44,.3);
    transform:translateY(103%);
    /* visibility différée : fiche fermée = hors tabulation et lecteurs d'écran */
    visibility:hidden;
    transition:transform .32s cubic-bezier(.22,1,.36,1), visibility 0s linear .32s;
    max-height:86vh;max-height:86dvh;
    display:flex;flex-direction:column;
    will-change:transform;
  }
  .sheet.open{transform:translateY(0);visibility:visible;transition:transform .32s cubic-bezier(.22,1,.36,1)}
  .grip{padding:10px 0 4px;display:flex;justify-content:center;flex:0 0 auto}
  .grip i{width:40px;height:5px;border-radius:3px;background:rgba(78,96,112,.3);display:block}
  .sheet-body{overflow-y:auto;padding:6px 18px calc(env(safe-area-inset-bottom) + 18px);-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
  .close{
    position:absolute;top:10px;right:12px;z-index:2;
    width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,.5);cursor:pointer;
    background:var(--tint);color:var(--encre-2);font-size:19px;line-height:1;font-weight:700;
  }
  .photo{
    width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:18px;
    background:var(--tint);display:block;
    border:1px solid rgba(255,255,255,.55);
  }
  .nophoto{
    width:100%;aspect-ratio:16/9;border-radius:18px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    background:linear-gradient(135deg,var(--c),color-mix(in srgb,var(--c) 55%,#fff));
    color:#fff;
  }
  .nophoto-big{font-size:34px;font-weight:800;opacity:.9}
  .nophoto-txt{font-size:11px;font-weight:700;opacity:.85}
  /* Bandeau des fiches bonus (pas de photo, juste la couleur de la catégorie) */
  .xhero{
    width:100%;height:96px;border-radius:18px;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--c),color-mix(in srgb,var(--c) 55%,#fff));
    border:1px solid rgba(255,255,255,.55);
  }
  .xhero span{font-size:40px}
  .xnote{font-size:11px;font-weight:600;color:#5A6B77;margin-bottom:14px;line-height:1.45}
  .credit{
    font-size:10px;font-weight:600;color:#5A6B77;
    margin:0 2px;padding:8px 0;display:inline-block;text-decoration:none;
  }
  .credit:hover{color:var(--corail)}
  .eyebrow{
    font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
    display:flex;align-items:center;gap:7px;margin:14px 0 3px;color:var(--encre-2);
  }
  .eyebrow .dot{width:9px;height:9px;border-radius:50%}
  .name{font-size:25px;font-weight:800;letter-spacing:-.02em;line-height:1.05;margin-bottom:10px}
  .desc{font-size:14.5px;line-height:1.6;color:#33434E;margin-bottom:14px}
  .facts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
  .fact{background:var(--tint);border:1px solid rgba(255,255,255,.5);padding:10px 12px;border-radius:16px}
  .fact dt{font-size:10px;font-weight:800;color:var(--encre-2);letter-spacing:.05em;text-transform:uppercase;margin-bottom:3px}
  .fact dd{font-size:13px;font-weight:700}
  .gps{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:var(--tint);border:1px solid rgba(255,255,255,.5);
    border-radius:16px;padding:11px 13px;margin-bottom:14px;
  }
  .gps code{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--corail-txt);letter-spacing:.02em}
  .copy{
    border:1px solid rgba(255,255,255,.6);background:rgba(255,255,255,.7);color:var(--encre);
    font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;
    min-height:44px;min-width:64px;padding:6px 12px;border-radius:12px;cursor:pointer;flex:0 0 auto;
  }
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .btn{
    display:flex;align-items:center;justify-content:center;gap:7px;
    min-height:48px;padding:13px;border-radius:16px;text-decoration:none;
    font-size:13.5px;font-weight:800;
  }
  .btn-go{
    background:var(--corail-btn);color:#fff;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.35), 0 8px 20px rgba(200,64,15,.4);
  }
  .btn-go:active{background:#A83409}
  .btn-photos{background:var(--tint);border:1px solid rgba(255,255,255,.55);color:var(--encre)}
  .btn:active{opacity:.85}

  /* ---------- Liste (timeline) ---------- */
  .list{
    position:absolute;z-index:1100;inset:0;
    background:var(--glass-voile);
    -webkit-backdrop-filter:blur(16px) saturate(1.7);
    backdrop-filter:blur(16px) saturate(1.7);
    overflow-y:auto;overscroll-behavior:contain;
    padding:calc(env(safe-area-inset-top) + 74px) 16px calc(env(safe-area-inset-bottom) + 30px);
    display:none;
  }
  .list.open{display:block}
  .grp{
    font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
    color:var(--encre);
    margin:20px 0 6px;display:flex;align-items:center;gap:8px;
  }
  .grp::after{content:'';flex:1;height:1px;background:rgba(78,96,112,.18)}
  .row{
    display:flex;align-items:center;gap:12px;padding:9px 6px;cursor:pointer;
    border-radius:16px;min-height:64px;
  }
  .row:hover,.row:active{background:rgba(255,255,255,.5)}
  .row .th{
    width:52px;height:52px;border-radius:15px;flex:0 0 auto;
    background:var(--c) center/cover no-repeat;
    border:1px solid rgba(255,255,255,.6);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:800;font-size:16px;
  }
  .row .txt{flex:1;min-width:0}
  .row .rn{font-size:15px;font-weight:800}
  .row .rd{font-size:11.5px;font-weight:600;color:var(--encre-2);margin-top:1px}
  .row .num{font-size:11px;font-weight:800;color:#4E6070}
  .list-note{font-size:11px;font-weight:600;color:#5A6B77;margin-top:26px;line-height:1.5}
  .gdot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;display:inline-block}

  /* ---------- À découvrir (bonus) ---------- */
  /* Au-dessus des boutons flottants (1150) : cet écran a son propre bouton de fermeture */
  .disco{
    position:absolute;z-index:1160;inset:0;
    background:var(--glass-voile);
    -webkit-backdrop-filter:blur(16px) saturate(1.7);
    backdrop-filter:blur(16px) saturate(1.7);
    overflow-y:auto;overscroll-behavior:contain;display:none;
    padding:0 16px calc(env(safe-area-inset-bottom) + 30px);
  }
  .disco.open{display:block}
  .disco-head{
    position:sticky;top:0;z-index:2;
    background:rgba(244,248,250,.92);
    -webkit-backdrop-filter:blur(16px) saturate(1.6);
    backdrop-filter:blur(16px) saturate(1.6);
    margin:0 -16px;padding:calc(env(safe-area-inset-top) + 16px) 16px 12px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  .disco-title{font-size:21px;font-weight:800;letter-spacing:-.02em}
  .disco-title span{color:var(--corail)}
  .disco-sub{font-size:11.5px;font-weight:700;color:var(--encre-2);margin-top:1px}
  .disco-close{
    width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,.6);cursor:pointer;flex:0 0 auto;
    background:rgba(255,255,255,.65);color:var(--encre-2);font-size:19px;line-height:1;font-weight:700;
  }
  .dgrp{
    font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
    color:var(--encre);
    margin:22px 0 8px;display:flex;align-items:center;gap:8px;
  }
  .dgrp::after{content:'';flex:1;height:1px;background:rgba(78,96,112,.18)}
  .ditem{
    display:flex;align-items:flex-start;gap:12px;padding:11px 6px;
    border-radius:16px;text-decoration:none;color:var(--encre);
  }
  .ditem:hover,.ditem:active{background:rgba(255,255,255,.5)}
  .ditem .ic{
    width:44px;height:44px;border-radius:14px;flex:0 0 auto;
    background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.65);
    font-size:21px;
    display:flex;align-items:center;justify-content:center;
  }
  .ditem .dt{flex:1;min-width:0}
  .ditem .dn{display:block;font-size:14.5px;font-weight:800}
  .ditem .dn small{font-weight:700;color:var(--encre-2);font-size:11px;margin-left:5px}
  .ditem .dd{display:block;font-size:12.5px;font-weight:600;color:#41525D;line-height:1.45;margin-top:2px}
  .ditem .go{flex:0 0 auto;align-self:center;color:#4E6070;font-size:16px;font-weight:800}
  .disco-note{font-size:11px;font-weight:600;color:#5A6B77;margin-top:24px;line-height:1.5}

  .leaflet-container{background:#C6D4DC;font-family:'Nunito',sans-serif}
  /* Contrôles remontés au-dessus du carrousel (sinon incliquables dessous) :
     le zoom encore plus haut pour ne pas croiser le bouton « À découvrir » */
  .leaflet-bottom.leaflet-left{margin-bottom:calc(env(safe-area-inset-bottom) + 262px)}
  .leaflet-bottom.leaflet-right{margin-bottom:calc(env(safe-area-inset-bottom) + 196px)}
  .leaflet-control-attribution{
    font-size:10px;color:#4E6070;border-radius:10px;margin-right:4px;
    background:rgba(255,255,255,.85);
    -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  }
  .leaflet-control-attribution a{color:var(--corail-fonce)}
  .leaflet-bar{border:0 !important;box-shadow:var(--ombre-leg) !important;border-radius:14px !important;overflow:hidden}
  .leaflet-bar a{
    background:rgba(255,255,255,.65);color:var(--encre);
    -webkit-backdrop-filter:blur(12px) saturate(1.5);backdrop-filter:blur(12px) saturate(1.5);
    border-color:rgba(255,255,255,.4);
  }
  .leaflet-bar a:hover{background:rgba(255,255,255,.85)}

  /* Desktop / tablette paysage — conditionné à la hauteur pour qu'un téléphone
     en paysage (ex. 844x390) tombe dans la branche paysage ci-dessous */
  @media (min-width:820px) and (min-height:520px){
    .cards{padding:14px calc(50vw - 135px) 8px}
    .card{flex-basis:270px}
    .sheet{left:auto;right:16px;bottom:16px;width:400px;border-radius:24px;border-bottom:1px solid var(--stroke);
           max-height:calc(100vh - 120px);max-height:calc(100dvh - 120px);
           transform:translateY(calc(100% + 40px))}
    .sheet.open{transform:translateY(0)}
    .title{font-size:22px}
    .fabs{bottom:calc(env(safe-area-inset-bottom) + 234px)}
    .disco-btn{bottom:calc(env(safe-area-inset-bottom) + 234px)}
    .list,.disco{padding-left:max(16px,calc(50vw - 330px));padding-right:max(16px,calc(50vw - 330px))}
    /* Fiche ouverte : elle occupe la colonne droite, on décale boutons et carrousel */
    body.sheet-open .fabs{right:428px}
    body.sheet-open .leaflet-bottom.leaflet-right{margin-right:416px}
  }
  /* Paysage bas (téléphone à l'horizontale) : filtres sur la ligne du titre,
     boutons en haut, cartes compactes, photo bornée en hauteur */
  @media (max-height:480px) and (orientation:landscape){
    .sub{display:none}
    .brand{padding:8px 12px;border-radius:14px}

  }

  @media (max-height:620px) and (orientation:portrait){

  @media (hover:hover){

  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none !important;animation:none !important}
  }
</style>

const ORDER = ['base','sud','nord','boni','mont'];

const map = L.map('map',{zoomControl:false, attributionControl:true}).setView([41.58,9.26],10);
L.control.zoom({position:'bottomleft'}).addTo(map);

/* Fond satellite : on voit la couleur de l'eau et la forme des criques */
const sat = L.layerGroup([
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{
    maxZoom:19, attribution:'&copy; Esri, Maxar, Earthstar Geographics'
  }),
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png',{
    maxZoom:19, attribution:'&copy; CARTO'
  })
]);
/* Fond plan clair, pour lire les routes et les villages */
const plan = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  maxZoom:19, attribution:'&copy; OpenStreetMap, &copy; CARTO'
});

sat.addTo(map);
let vue = 'sat';
document.getElementById('vueToggle').onclick = ()=>{
  if(vue==='sat'){ map.removeLayer(sat); plan.addTo(map); vue='plan'; }
  else{ map.removeLayer(plan); sat.addTo(map); vue='sat'; }
};

const markers = {};
let active = null;
const state = new Set(ORDER);

SPOTS.forEach((s,i)=>{
  const hex = CATS[s.cat].hex;
  const inner = s.img
    ? `<div class="ph" style="--c:${hex};background-image:url('${T(s.img)}')"></div>`
    : `<div class="ph" style="--c:${hex}">${s.n[0]}</div>`;
  const icon = L.divIcon({
    className:'', iconSize:[44,44], iconAnchor:[22,22],
    html:`<div class="step" id="step${i}">${inner}<span class="num">${i+1}</span></div>`
  });
  const m = L.marker([s.lat,s.lng],{icon, title:s.n}).addTo(map);
  /* 1er clic (ou Entrée) : sélection ; 2e sur le marqueur déjà actif : fiche */
  m.on('click',()=>{ if(active===i){ open(i); } else { select(i,{scroll:true}); } });
  markers[i]=m;
});

/* ---------- Filtres ---------- */
const fEl = document.getElementById('filters');
ORDER.forEach(k=>{
  const b = document.createElement('button');
  b.className='chip glass on';
  b.style.setProperty('--c',CATS[k].hex);
  b.dataset.k=k;
  b.setAttribute('aria-pressed','true');
  b.innerHTML=`<span class="dot"></span>${CATS[k].label}`;
  b.onclick=()=>{
    if(state.has(k)){state.delete(k); b.classList.remove('on');}
    else{state.add(k); b.classList.add('on');}
    b.setAttribute('aria-pressed', state.has(k) ? 'true' : 'false');
    render();
  };
  fEl.appendChild(b);
});

/* ---------- Carrousel ---------- */
const cardsEl = document.getElementById('cards');
let scrollLock = false;  /* évite la boucle scroll <-> select */

function buildCards(){
  const visible = SPOTS.map((s,i)=>i).filter(i=>state.has(SPOTS[i].cat));
  cardsEl.innerHTML = visible.map(i=>{
    const s=SPOTS[i], hex=CATS[s.cat].hex;
    return `<div class="card" data-i="${i}" id="card${i}" tabindex="0" role="button" aria-label="${s.n}, ouvrir la fiche">
      <div class="im" style="--c:${hex};background-image:url('${T(s.img)}')">
        <span class="badge"><i></i>${CATS[s.cat].label}</span>
      </div>
      <div class="tx"><div class="nm">${i+1}. ${s.n}</div><div class="mt">${s.trajet} · ${s.acces}</div></div>
    </div>`;
  }).join('');
  cardsEl.querySelectorAll('.card').forEach(c=>{
    const act=()=>{
      const i=parseInt(c.dataset.i);
      if(active===i){ open(i); }
      /* Tap rapide pendant le recentrage : la carte a glissé sous le doigt,
         l'intention était d'ouvrir la carte fraîchement sélectionnée */
      else if(scrollLock && active!==null){ open(active); }
      else{ select(i,{scroll:true}); }
    };
    c.onclick=act;
    c.addEventListener('keydown',e=>{
      if(e.key==='Enter'||e.key===' '){ e.preventDefault(); act(); }
    });
  });
}

/* Sélection = carte mise en avant + marqueur agrandi + recentrage doux
   Précharge l'image pleine taille pour que la fiche s'ouvre instantanément. */
function select(i,{scroll=false,fly=true}={}){
  active=i;
  document.querySelectorAll('.step.active').forEach(p=>p.classList.remove('active'));
  const st=document.getElementById('step'+i); if(st) st.classList.add('active');
  document.querySelectorAll('.card.sel').forEach(c=>c.classList.remove('sel'));
  const cd=document.getElementById('card'+i); if(cd) cd.classList.add('sel');
  if(scroll && cd){
    scrollLock=true;
    cd.scrollIntoView({behavior:RM?'auto':'smooth',inline:'center',block:'nearest'});
    setTimeout(()=>scrollLock=false, RM?80:650);
  }
  const s=SPOTS[i];
  if(s.img){ const pre=new Image(); pre.src=s.img; }
  if(fly){
    if(RM) map.setView([s.lat,s.lng], Math.max(map.getZoom(),12));
    else map.flyTo([s.lat,s.lng], Math.max(map.getZoom(),12), {duration:.55});
  }
}

/* Molette souris : le défilement vertical fait glisser le carrousel */
cardsEl.addEventListener('wheel',e=>{
  if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){
    cardsEl.scrollLeft+=e.deltaY;
    e.preventDefault();
  }
},{passive:false});

/* Swipe du carrousel -> sélectionne la carte centrée */
let scrollT;
cardsEl.addEventListener('scroll',()=>{
  if(scrollLock) return;
  clearTimeout(scrollT);
  scrollT=setTimeout(()=>{
    const mid=cardsEl.scrollLeft + cardsEl.clientWidth/2;
    let best=null, bd=1e9;
    cardsEl.querySelectorAll('.card').forEach(c=>{
      const d=Math.abs(c.offsetLeft + c.offsetWidth/2 - mid);
      if(d<bd){bd=d;best=c;}
    });
    if(best){
      const i=parseInt(best.dataset.i);
      if(i!==active) select(i,{scroll:false});
    }
  },120);
},{passive:true});

function render(){
  let n=0;
  SPOTS.forEach((s,i)=>{
    if(state.has(s.cat)){ markers[i].addTo(map); n++; }
    else{ map.removeLayer(markers[i]); }
  });
  document.getElementById('counter').textContent = n + (n>1?' spots':' spot') + ' · base Porto-Vecchio';
  if(active!==null && !state.has(SPOTS[active].cat)) active=null;
  buildCards();
  if(active!==null) select(active,{scroll:true,fly:false});
  buildList();
}

/* ---------- Fiche détaillée ---------- */
const sheet=document.getElementById('sheet');
const body=document.getElementById('sheetBody');

function open(i){
  const s=SPOTS[i], hex=CATS[s.cat].hex;
  const gps=`${s.lat.toFixed(5)}, ${s.lng.toFixed(5)}`;
  const dir=`https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}&destination_place_id=${s.pid}`;
  const gm=`https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lng}&query_place_id=${s.pid}`;
  const photo = s.img
    ? `<img class="photo" src="${s.img}" alt="${s.n}" decoding="async">
       <a class="credit" href="${s.capUrl}" target="_blank" rel="noopener">${s.cap}</a>`
    : `<div class="nophoto" style="--c:${hex}">
         <span class="nophoto-big">${s.n[0]}</span>
         <span class="nophoto-txt">Crique sauvage · pas de photo libre de droits</span>
       </div>`;

  body.innerHTML = `
    ${photo}
    <div class="eyebrow"><span class="dot" style="background:${hex}"></span>${CATS[s.cat].label} · N°${i+1}</div>
    <h2 class="name" id="spotName">${s.n}</h2>
    <p class="desc">${s.d}</p>
    <dl class="facts">
      <div class="fact"><dt>Depuis Porto-Vecchio</dt><dd>${s.trajet}</dd></div>
      <div class="fact"><dt>Accès et parking</dt><dd>${s.acces}</dd></div>
    </dl>
    <div class="gps">
      <code id="gpsTxt">${gps}</code>
      <button class="copy" id="copyBtn">Copier</button>
    </div>
    <div class="actions">
      <a class="btn btn-go" href="${dir}" target="_blank" rel="noopener">Itinéraire</a>
      <a class="btn btn-photos" href="${gm}" target="_blank" rel="noopener">Photos et avis</a>
    </div>`;

  document.getElementById('copyBtn').onclick=(e)=>{
    navigator.clipboard.writeText(gps).then(()=>{
      e.target.textContent='Copié !'; setTimeout(()=>e.target.textContent='Copier',1400);
    }).catch(()=>{e.target.textContent='Échec';});
  };

  select(i,{scroll:true,fly:false});
  sheet.classList.add('open');
  document.body.classList.add('sheet-open');
  body.scrollTop=0;
  document.getElementById('list').classList.remove('open');
  document.getElementById('disco').classList.remove('open');
  document.getElementById('closeSheet').focus({preventScroll:true});

  const desktop = window.innerWidth>=820 && window.innerHeight>=520;
  const off = desktop ? [0.15,0] : [0,-0.045];
  const dest=[s.lat+off[1], s.lng+off[0]], z=Math.max(map.getZoom(),13);
  if(RM) map.setView(dest, z); else map.flyTo(dest, z, {duration:.6});
}

function closeSheet(){
  const wasOpen=sheet.classList.contains('open');
  sheet.classList.remove('open');
  document.body.classList.remove('sheet-open');
  /* Rendre le focus à la carte active (sinon il reste piégé hors écran) */
  if(wasOpen && active!==null){
    const cd=document.getElementById('card'+active);
    if(cd) cd.focus({preventScroll:true});
  }
}
document.getElementById('closeSheet').onclick=closeSheet;
/* Un tap qui « rate » une carte en mouvement (recentrage en cours) tombe sur la
   carte géographique à travers la gouttière : s'il est dans la bande du
   carrousel pendant l'animation, l'intention était d'ouvrir la fiche. */
map.on('click',(e)=>{
  const bandTop = cardsEl.getBoundingClientRect().top;
  if(scrollLock && active!==null && e.containerPoint.y >= bandTop){ open(active); return; }
  closeSheet();
});

/* Drag du grip vers le bas = fermeture (l'affordance que le grip promet) */
{
  const grip=sheet.querySelector('.grip');
  let y0=null;
  grip.addEventListener('touchstart',e=>{
    y0=e.touches[0].clientY;
    sheet.style.transition='none';
  },{passive:true});
  grip.addEventListener('touchmove',e=>{
    if(y0===null) return;
    const dy=Math.max(0, e.touches[0].clientY-y0);
    sheet.style.transform=`translateY(${dy}px)`;
  },{passive:true});
  grip.addEventListener('touchend',e=>{
    if(y0===null) return;
    const dy=e.changedTouches[0].clientY-y0;
    sheet.style.transition='';
    sheet.style.transform='';
    if(dy>110) closeSheet();
    y0=null;
  });
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeSheet();document.getElementById('list').classList.remove('open');document.getElementById('disco').classList.remove('open');}});

/* ---------- Liste (timeline) ---------- */
const listEl=document.getElementById('list');
function buildList(){
  let h='';
  ORDER.forEach(k=>{
    const items=SPOTS.map((s,i)=>({s,i})).filter(o=>o.s.cat===k && state.has(k));
    if(!items.length) return;
    h+=`<h2 class="grp"><i class="gdot" style="background:${CATS[k].hex}"></i>${CATS[k].label}</h2>`;
    items.forEach(({s,i})=>{
      const th = s.img
        ? `<span class="th" style="--c:${CATS[k].hex};background-image:url('${T(s.img)}')"></span>`
        : `<span class="th" style="--c:${CATS[k].hex}">${s.n[0]}</span>`;
      h+=`<div class="row" data-i="${i}" tabindex="0" role="button" aria-label="${s.n}, ouvrir la fiche">
            ${th}
            <span class="txt"><span class="rn">${s.n}</span><br><span class="rd">${s.trajet}</span></span>
            <span class="num">N°${String(i+1).padStart(2,'0')}</span>
          </div>`;
    });
  });
  h = h || '<div class="grp">Aucun spot affiché, réactive un filtre.</div>';
  h += `<p class="list-note">Photos : Wikimedia Commons, Flickr et IGN, sous licences libres.
        L'auteur et la licence de chaque photo sont indiqués sur la fiche du spot.</p>`;
  listEl.innerHTML=h;
  listEl.querySelectorAll('.row').forEach(r=>{
    const act=()=>{listEl.classList.remove('open');open(parseInt(r.dataset.i));};
    r.onclick=act;
    r.addEventListener('keydown',e=>{
      if(e.key==='Enter'||e.key===' '){ e.preventDefault(); act(); }
    });
  });
}

document.getElementById('listToggle').onclick=()=>{
  const o=listEl.classList.toggle('open');
  if(o){ closeSheet(); discoEl.classList.remove('open'); }
};

const discoEl = document.getElementById('disco');
document.getElementById('discoBody').innerHTML = EXTRAS.map((g,gi)=>`
  <h2 class="dgrp"><i class="gdot" style="background:${g.hex}"></i>${g.emoji}&nbsp; ${g.cat}</h2>
  ${g.items.map((it,ii)=>`
    <a class="ditem" data-gi="${gi}" data-ii="${ii}" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(it.q)}" rel="noopener">
      <span class="ic">${g.emoji}</span>
      <span class="dt">
        <span class="dn">${it.n}<small>${it.w}</small></span>
        <span class="dd">${it.d}</span>
      </span>
      <span class="go">›</span>
    </a>`).join('')}
`).join('') + `<p class="disco-note">Sélection indicative : horaires, prix et conditions à vérifier sur place,
  surtout hors saison. Chaque ligne montre le lieu sur la carte ; l'itinéraire s'ouvre ensuite dans Google Maps.</p>`;

/* Clic sur une ligne : on montre le point sur la carte au lieu de quitter le site */
discoEl.querySelectorAll('.ditem').forEach(a=>{
  a.addEventListener('click',e=>{
    e.preventDefault();
    openExtra(parseInt(a.dataset.gi), parseInt(a.dataset.ii));
  });
});

document.getElementById('discoBtn').onclick=()=>{
  closeSheet();
  listEl.classList.remove('open');
  discoEl.classList.add('open');
};
document.getElementById('closeDisco').onclick=()=>discoEl.classList.remove('open');

/* ---------- Petits points « à découvrir » sur la carte ---------- */
const extrasLayer = L.layerGroup();
EXTRAS.forEach((g,gi)=>{
  g.items.forEach((it,ii)=>{
    const dot = L.circleMarker([it.lat,it.lng],{
      radius:7, color:'#fff', weight:2, opacity:.95,
      fillColor:g.hex, fillOpacity:.95,
      bubblingMouseEvents:false
    });
    dot.bindTooltip(`${g.emoji} ${it.n}`,{direction:'top',offset:[0,-8]});
    dot.on('click',()=>openExtra(gi,ii));
    extrasLayer.addLayer(dot);
  });
});
extrasLayer.addTo(map);
let showExtras = true;

/* Pastille de filtre dédiée aux points bonus */
{
  const b = document.createElement('button');
  b.className='chip glass on';
  b.style.setProperty('--c','#FF5324');
  b.setAttribute('aria-pressed','true');
  b.innerHTML=`<span class="dot"></span>À découvrir`;
  b.onclick=()=>{
    showExtras=!showExtras;
    b.classList.toggle('on',showExtras);
    b.setAttribute('aria-pressed', showExtras ? 'true' : 'false');
    if(showExtras) extrasLayer.addTo(map); else map.removeLayer(extrasLayer);
  };
  fEl.appendChild(b);
}

/* Mini-fiche d'un spot bonus */
function openExtra(gi, ii){
  const g=EXTRAS[gi], it=g.items[ii];
  const gm=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(it.q)}`;
  const dir=`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(it.q)}`;

  body.innerHTML = `
    <div class="xhero" style="--c:${g.hex}"><span>${g.emoji}</span></div>
    <div class="eyebrow"><span class="dot" style="background:${g.hex}"></span>${g.cat} · bonus</div>
    <h2 class="name" id="spotName">${it.n}</h2>
    <p class="desc"><b>${it.w}.</b> ${it.d}</p>
    <p class="xnote">Position indicative sur la carte — l'itinéraire utilise la fiche Google Maps du lieu.</p>
    <div class="actions">
      <a class="btn btn-go" href="${dir}" target="_blank" rel="noopener">Itinéraire</a>
      <a class="btn btn-photos" href="${gm}" target="_blank" rel="noopener">Google Maps</a>
    </div>`;

  document.querySelectorAll('.step.active').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.card.sel').forEach(c=>c.classList.remove('sel'));
  active=null;

  sheet.classList.add('open');
  document.body.classList.add('sheet-open');
  body.scrollTop=0;
  listEl.classList.remove('open');
  discoEl.classList.remove('open');
  document.getElementById('closeSheet').focus({preventScroll:true});

  const desktop = window.innerWidth>=820 && window.innerHeight>=520;
  const off = desktop ? [0.15,0] : [0,-0.045];
  const dest=[it.lat+off[1], it.lng+off[0]], z=Math.max(map.getZoom(),13);
  if(RM) map.setView(dest, z); else map.flyTo(dest, z, {duration:.6});
}

render();
map.fitBounds(SPOTS.map(s=>[s.lat,s.lng]),{padding:[70,70]});
